<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Status Code Puzzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Monaco', 'Courier New', monospace;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 60px;
    }

    .status-code {
      font-size: 240px;
      font-weight: 900;
      letter-spacing: 20px;
      text-align: center;
      user-select: none;
      cursor: text;
      transition: all 0.3s;
      outline: none;
    }

    .status-code:hover {
      filter: brightness(1.1);
    }

    .status-code:active {
      transform: scale(0.98);
    }

    .tip {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      max-width: 600px;
      padding: 0 20px;
      min-height: 30px;
      transition: opacity 0.2s;
    }

    .http-status {
      font-size: 14px;
      opacity: 0.85;
      letter-spacing: 0;
    }

    body.status-1 { background-color: #00bcd4; color: #fff; }
    body.status-2 { background-color: #4caf50; color: #fff; }
    body.status-3 { background-color: #2196f3; color: #fff; }
    body.status-4 { background-color: #ff9800; color: #fff; }
    body.status-5 { background-color: #f44336; color: #fff; }
  </style>
</head>
<body class="status-2">
  <div class="container">
    <div class="status-code" contenteditable="true" spellcheck="false" inputmode="numeric">200</div>
    <div class="tip">200 OK - リクエストは成功しました</div>
    <div class="http-status">HTTP/1.1 200 OK</div>
  </div>

  <script>
    const statusCodeElement = document.querySelector('.status-code');
    const tipElement = document.querySelector('.tip');
    const httpStatusElement = document.querySelector('.http-status');

    function bodyClassForStatus(status) {
      const first = String(status)[0];
      if ('12345'.includes(first)) return `status-${first}`;
      return 'status-4';
    }

    function normalizeCode(raw) {
      const text = String(raw).replace(/\D/g, '');
      if (text.length >= 3) return text.slice(-3);
      return text;
    }

    function getCodeFromPath() {
      const path = window.location.pathname.replace(/\/$/, '');
      const segments = path.split('/').filter(Boolean);
      const last = segments[segments.length - 1];
      if (/^\d{3}$/.test(last)) return last;

      const fileMatch = window.location.pathname.match(/(\d{3})\.html$/);
      if (fileMatch) return fileMatch[1];

      return '200';
    }

    function getUrlForCode(code) {
      const path = window.location.pathname;
      if (/^\d{3}\.html$/.test(path.split('/').pop() || '')) {
        return code + '.html';
      }
      return '/' + code;
    }

    function applyPayload(payload, httpStatus) {
      const code = payload.code;
      statusCodeElement.textContent = code;
      document.body.className = bodyClassForStatus(httpStatus);
      tipElement.textContent = `${httpStatus} ${payload.phrase} - ${payload.description}`;
      httpStatusElement.textContent = `HTTP/1.1 ${httpStatus} ${payload.phrase}`;
      document.title = `HTTP ${httpStatus}`;
      return code;
    }

    let lastNavigatedCode = getCodeFromPath();
    let lastHttpStatus = 200;
    let lastPayload = null;
    let navigateSeq = 0;

    async function resolveFromServer(code, { updateHistory = true } = {}) {
      code = normalizeCode(code);
      if (code.length !== 3) return;

      const seq = ++navigateSeq;
      tipElement.style.opacity = '0.6';

      try {
        const res = await fetch(`/api/${code}`);
        const payload = await res.json();
        if (seq !== navigateSeq) return;

        const httpStatus = res.status;
        applyPayload(payload, httpStatus);
        lastNavigatedCode = code;
        lastHttpStatus = httpStatus;
        lastPayload = payload;

        if (updateHistory) {
          const url = getUrlForCode(code);
          history.pushState({ code, httpStatus, payload }, '', url);
        }
      } catch {
        if (seq !== navigateSeq) return;
        document.body.className = bodyClassForStatus(code);
        tipElement.textContent = `${code} - サーバーに接続できません`;
        httpStatusElement.textContent = 'HTTP/1.1 — —';
      } finally {
        if (seq === navigateSeq) {
          tipElement.style.opacity = '1';
        }
      }
    }

    function initFromUrl() {
      const fallback = {
        code: getCodeFromPath(),
        status: 200,
        phrase: 'OK',
        description: 'リクエストは成功しました',
      };
      const initial = window.__INITIAL__ || fallback;
      const httpStatus = initial.status ?? fallback.status;
      const code = applyPayload(initial, httpStatus);
      lastNavigatedCode = code;
      lastHttpStatus = httpStatus;
      lastPayload = initial;

      const pathMatch = window.location.pathname.match(/\/(\d{3})\/?$/);
      if (pathMatch) {
        history.replaceState({ code, httpStatus, payload: initial }, '', getUrlForCode(code));
      } else {
        history.replaceState({ code, httpStatus, payload: initial }, '', window.location.pathname);
      }
    }

    statusCodeElement.addEventListener('input', () => {
      let code = normalizeCode(statusCodeElement.textContent);
      if (code.length > 3) code = code.slice(-3);

      if (code !== statusCodeElement.textContent) {
        statusCodeElement.textContent = code;
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(statusCodeElement);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      if (code.length === 3 && code !== lastNavigatedCode) {
        resolveFromServer(code);
      }
    });

    statusCodeElement.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        resolveFromServer(statusCodeElement.textContent);
        statusCodeElement.blur();
      }
    });

    statusCodeElement.addEventListener('blur', () => {
      const code = normalizeCode(statusCodeElement.textContent);
      if (code.length !== 3 && lastPayload) {
        applyPayload(lastPayload, lastHttpStatus);
      }
    });

    statusCodeElement.addEventListener('click', () => {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(statusCodeElement);
      selection.removeAllRanges();
      selection.addRange(range);
    });

    window.addEventListener('popstate', (e) => {
      const state = e.state;
      if (state?.payload) {
        applyPayload(state.payload, state.httpStatus);
        lastNavigatedCode = state.code;
        lastHttpStatus = state.httpStatus;
        lastPayload = state.payload;
        return;
      }
      resolveFromServer(getCodeFromPath(), { updateHistory: false });
    });

    initFromUrl();
  </script>
</body>
</html>
